<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regalia Front Desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="hero-bg" aria-hidden="true">
        <img class="hero-bg__left" src="./buildings-left.png" alt="" loading="eager" />
        <img class="hero-bg__center" src="./buildings-center.png" alt="" loading="eager" />
        <img class="hero-bg__right" src="./buildings-right.png" alt="" loading="eager" />
      </div>

      <main class="content">
        <header class="brand">
          <div class="brand__logo-wrap">
            <img class="brand__logo-shadow" src="./logo-shadow.png" alt="" loading="eager" />
            <img class="brand__logo" src="./logo.png" alt="Regalia" />
          </div>
        </header>

        <section class="panel-stack" aria-live="polite">

          <!-- Passcode gate (temporary — remove or replace with real auth later) -->
          <section class="panel is-active" data-view="gate">
            <div class="card card--gate">
              <h2 class="card__title">Regalia</h2>
              <p class="card__subtitle">Enter passcode to continue</p>
              <form class="form" data-gate-form autocomplete="off">
                <label class="field">
                  <span>Passcode</span>
                  <input
                    type="password"
                    name="passcode"
                    data-gate-input
                    placeholder="Passcode"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    required
                  />
                </label>
                <div class="gate-error" data-gate-error role="alert"></div>
                <button class="btn primary" type="submit">Continue</button>
              </form>
              <p class="gate-note muted">Temporary access for deployment &amp; pitching</p>
            </div>
          </section>

          <!-- Welcome Panel -->
          <section class="panel is-hidden" data-view="welcome">
            <h1 class="welcome-title">Welcome!</h1>
            <div class="button-group">
              <button class="btn outline" data-action="to-login">Login</button>
            </div>
          </section>

          <!-- Login Panel -->
          <section class="panel is-hidden" data-view="login">
            <div class="card">
              <h2 class="card__title">Enter Account Details</h2>
              <form class="form" autocomplete="on" data-login-form>
                <label class="field">
                  <span>Username / Email</span>
                  <input type="text" name="login" placeholder="Username or Email" autocomplete="username" />
                </label>
                <label class="field">
                  <span>Password</span>
                  <div class="input-group">
                    <input id="login-password" type="password" name="password" placeholder="Password" autocomplete="current-password" />
                    <button class="icon-toggle" type="button" data-toggle="password" data-target="login-password" aria-label="Show password">Show</button>
                  </div>
                </label>

                <div class="login-error" data-login-error></div>
                <button class="btn primary" type="submit">Log in</button>
              </form>

              <button class="link muted" type="button" data-action="to-welcome">Back to welcome</button>
            </div>
          </section>

        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
