      <main class="main">
        <header class="topbar">
          <button class="menu-toggle" type="button" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24">
              <line x1="4" y1="7" x2="20" y2="7"></line>
              <line x1="4" y1="12" x2="20" y2="12"></line>
              <line x1="4" y1="17" x2="20" y2="17"></line>
            </svg>
          </button>
          <div>
            <h1>Guests</h1>
            <p>Monitor active guests.</p>
          </div>
          <div class="top-actions">
            <div class="notif-wrap">
              <button class="notif-btn" data-notif-btn aria-label="Notifications">
                <svg viewBox="0 0 24 24">
                  <path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>

              </button>
              <div class="topbar-dropdown notif-dropdown" data-notif-dropdown>
                <div class="topbar-dropdown__title">Today's Activity</div>
                <div class="notif-list" data-notif-list>
                  <div class="notif-empty">No activity today</div>
                </div>
              </div>
            </div>
            <div class="profile-wrap">
              <button class="avatar avatar-btn" data-profile-btn aria-label="Account">FD</button>
              <div class="topbar-dropdown profile-dropdown" data-profile-dropdown>
                <div class="profile-info">
                  <div class="profile-avatar-lg" data-profile-initials-lg>FD</div>
                  <div>
                    <div class="profile-name" data-profile-name>Staff</div>
                    <div class="profile-role" data-profile-role>Front Desk</div>
                  </div>
                </div>
                <div class="topbar-dropdown__divider"></div>
                <button class="profile-action" data-open-profile>
                  <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                  Profile
                </button>
                <a href="../index.html" class="profile-action" data-logout-link>
                  <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                  Logout

              </div>
            </div>

        <section class="panel-stack">
          <div class="panel">
            <h3>Checked-in guests</h3>
            <p class="muted" style="margin:0 0 12px;font-size:13px;"><span data-checked-in-count>0</span> guest(s) currently in-house</p>
            <div class="list" data-active-guests></div>
          </div>

        </section>
      </main>

      <!-- Settings Modal: Theme Picker -->
      <div class="settings-overlay" data-settings-overlay>
        <div class="settings-modal">
          <div class="settings-header">
            <h2>Appearance</h2>
            <button class="settings-close" data-settings-close>&times;</button>
          </div>
          <div class="settings-body">
            <p class="settings-subtitle">Choose a color theme for your dashboard</p>
            <div class="theme-grid" data-theme-grid>
              <button class="theme-swatch theme-swatch--default is-active" data-theme="default"><span class="theme-preview"></span><span class="theme-label">Default</span></button>
              <button class="theme-swatch theme-swatch--ocean" data-theme="ocean"><span class="theme-preview"></span><span class="theme-label">Ocean</span></button>
              <button class="theme-swatch theme-swatch--sunset" data-theme="sunset"><span class="theme-preview"></span><span class="theme-label">Sunset</span></button>
              <button class="theme-swatch theme-swatch--forest" data-theme="forest"><span class="theme-preview"></span><span class="theme-label">Forest</span></button>
              <button class="theme-swatch theme-swatch--purple" data-theme="purple"><span class="theme-preview"></span><span class="theme-label">Purple</span></button>
              <button class="theme-swatch theme-swatch--midnight" data-theme="midnight"><span class="theme-preview"></span><span class="theme-label">Midnight</span></button>
              <button class="theme-swatch theme-swatch--rose" data-theme="rose"><span class="theme-preview"></span><span class="theme-label">Rose</span></button>
            </div>
            <div class="theme-status" data-theme-status></div>
          </div>
        </div>
      </div>

      <!-- Profile Modal -->
      <div class="settings-overlay" data-profile-overlay>
        <div class="settings-modal">
          <div class="settings-header">
            <h2>Profile</h2>
            <button class="settings-close" data-profile-close>&times;</button>
          </div>
          <div class="settings-body">
            <div class="settings-section">
              <h3>Account Info</h3>
              <form class="settings-form" data-profile-form>
                <label class="settings-field"><span>Full Name</span><input type="text" name="full_name" data-pf-name /></label>
                <label class="settings-field"><span>Username</span><input type="text" name="username" data-pf-username /></label>
                <label class="settings-field"><span>Email</span><input type="email" name="email" data-pf-email /></label>
                <label class="settings-field"><span>Contact Number</span><input type="text" name="contact" data-pf-contact /></label>
                <div class="settings-msg" data-pf-msg></div>
                <button type="submit" class="btn ghost settings-save">Save Changes</button>
              </form>
            </div>
            <div class="settings-divider"></div>
            <div class="settings-section">
              <h3>Change Password</h3>
              <form class="settings-form" data-pw-form>
                <label class="settings-field"><span>Current Password</span><input type="password" name="current_password" required /></label>
                <label class="settings-field"><span>New Password</span><input type="password" name="new_password" required /></label>
                <label class="settings-field"><span>Confirm New Password</span><input type="password" name="confirm_password" required /></label>
                <div class="settings-msg" data-pw-msg></div>
                <button type="submit" class="btn ghost settings-save">Update Password</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./staffscript.js"></script>
    <script>
      (function () {
        var R = window.RegaliaStaff;
        if (!R) return;
        R.getBookings().then(function (bookings) {
          var active = bookings.filter(function (b) {
            return b.status === "confirmed" && b.checked_in_at && !b.checked_out_at;
          });
          var countEl = document.querySelector("[data-checked-in-count]");
          if (countEl) countEl.textContent = active.length;
          var listEl = document.querySelector("[data-active-guests]");
          if (listEl) {
            var roomStr = function (b) {
              return (b.tower_name ? b.tower_name + " " : "") + "Unit " + (b.unit_number || b.unit_id);
            };
            listEl.innerHTML = active.length === 0
              ? "<div class=\"list-item\"><div>No guests checked in</div></div>"
              : active.map(function (b) {
                  return "<div class=\"list-item\"><div><strong>" + (b.guest_name || "Guest") + "</strong><small>" + roomStr(b) + "</small></div><span class=\"status status--occupied\"><span class=\"dot\"></span>In</span></div>";
                }).join("");
          }
        });
      })();
    </script>
    <script>
      // Populate notifications from bookings
      (function () {
        var R = window.RegaliaStaff;
        if (!R) return;
        R.getBookings().then(function (bookings) {
          if (!Array.isArray(bookings)) bookings = [];
          var todayKey = R.toDateKey(new Date());
          var movements = [];
          bookings.filter(function (b) { return b.status === "confirmed"; }).forEach(function (b) {
            var ciToday = R.toDateKey(b.check_in_date) === todayKey;
            var coToday = R.toDateKey(b.check_out_date) === todayKey;
            var alreadyCheckedIn = !!b.checked_in_at && !b.checked_out_at;
            if (ciToday) movements.push({ type: alreadyCheckedIn ? "checked-in" : "upcoming", name: b.guest_name, unit: b.unit_number || b.unit_id, tower: b.tower_name });
            if (coToday) movements.push({ type: "departure", name: b.guest_name, unit: b.unit_number || b.unit_id, tower: b.tower_name });
          });
          var notifList = document.querySelector("[data-notif-list]");
          var notifBadge = document.querySelector("[data-notif-badge]");
          if (notifList && movements.length) {
            var iconMap = { upcoming: "↓", "checked-in": "✓", departure: "→" };
            var labelMap = { upcoming: "Upcoming check-in", "checked-in": "Checked in", departure: "Departure" };
            notifList.innerHTML = movements.slice(0, 8).map(function (m) {
              return "<div class=\"notif-item notif-item--" + m.type + "\"><div class=\"notif-item__icon\">" + (iconMap[m.type] || "•") + "</div><div><div class=\"notif-item__name\">" + (m.name || "Guest") + "</div><div class=\"notif-item__detail\">" + (labelMap[m.type] || m.type) + " · Unit " + (m.unit || "—") + (m.tower ? " · " + m.tower : "") + "</div></div></div>";
            }).join("");
            if (notifBadge) notifBadge.textContent = movements.length;
          }
        }).catch(function () {});
      })();

      // Profile info from localStorage
      (function () {
        try {
          var emp = JSON.parse(localStorage.getItem("employee") || "{}");
          var role = localStorage.getItem("role") || "Staff";
          var name = emp.full_name || emp.username || "Staff";
          var initials = name.split(" ").filter(Boolean).map(function (w) { return w[0]; }).join("").slice(0, 2).toUpperCase() || "FD";
          var profileBtn = document.querySelector("[data-profile-btn]");
          var nameLg = document.querySelector("[data-profile-initials-lg]");
          var nameEl = document.querySelector("[data-profile-name]");
          var roleEl = document.querySelector("[data-profile-role]");
          if (profileBtn) profileBtn.textContent = initials;
          if (nameLg) nameLg.textContent = initials;
          if (nameEl) nameEl.textContent = name;
          if (roleEl) roleEl.textContent = role;
        } catch (e) {}
        var logoutLink = document.querySelector("[data-logout-link]");
        if (logoutLink) logoutLink.addEventListener("click", function () { try { var tc = localStorage.getItem("theme_color"); localStorage.clear(); if (tc) localStorage.setItem("theme_color", tc); } catch (e) {} });
      })();

      // Dropdown toggle logic
      (function () {
        var notifBtn = document.querySelector("[data-notif-btn]");
        var notifDropdown = document.querySelector("[data-notif-dropdown]");
        var profileBtn = document.querySelector("[data-profile-btn]");
        var profileDropdown = document.querySelector("[data-profile-dropdown]");
        function closeAll() {
          if (notifDropdown) notifDropdown.classList.remove("is-open");
          if (profileDropdown) profileDropdown.classList.remove("is-open");
        }
        if (notifBtn) notifBtn.addEventListener("click", function (e) { e.stopPropagation(); var open = notifDropdown.classList.contains("is-open"); closeAll(); if (!open) notifDropdown.classList.add("is-open"); });
        if (profileBtn) profileBtn.addEventListener("click", function (e) { e.stopPropagation(); var open = profileDropdown.classList.contains("is-open"); closeAll(); if (!open) profileDropdown.classList.add("is-open"); });
        document.addEventListener("click", closeAll);
        document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeAll(); });
      })();

      // Theme picker + settings modal logic
      (function () {
        var overlay = document.querySelector("[data-settings-overlay]");
        var closeBtn = document.querySelector("[data-settings-close]");
        var openBtn = document.querySelector("[data-open-settings]");
        if (!overlay) return;
        function openSettings() { overlay.classList.add("is-open"); document.body.classList.remove("sidebar-open"); }
        function closeSettings() { overlay.classList.remove("is-open"); }
        if (openBtn) openBtn.addEventListener("click", function (e) { e.preventDefault(); openSettings(); });
        if (closeBtn) closeBtn.addEventListener("click", closeSettings);
        overlay.addEventListener("click", function (e) { if (e.target === overlay) closeSettings(); });
        document.addEventListener("keydown", function (e) { if (e.key === "Escape" && overlay.classList.contains("is-open")) closeSettings(); });
        var themes = ["default","ocean","sunset","forest","purple","midnight","rose"];
        var grid = overlay.querySelector("[data-theme-grid]");
        var statusEl = overlay.querySelector("[data-theme-status]");
        function applyTheme(name) {
          themes.forEach(function (t) { document.body.classList.remove("theme-" + t); });
          if (name && name !== "default") document.body.classList.add("theme-" + name);
          if (grid) grid.querySelectorAll(".theme-swatch").forEach(function (s) {
            s.classList.toggle("is-active", s.getAttribute("data-theme") === name);
          });
        }
        function getHeaders() {
          var h = { "Content-Type": "application/json" };
          try { var t = localStorage.getItem("token"); if (t) h.Authorization = "Bearer " + t; } catch (e) {}
          return h;
        }
        function saveThemeToServer(name) {
          localStorage.setItem("theme_color", name);
          if (statusEl) { statusEl.textContent = "Saving..."; statusEl.className = "theme-status"; }
          fetch((window.RegaliaStaff ? window.RegaliaStaff.API : "/api") + "/employee/theme", {
            method: "PUT", headers: getHeaders(), body: JSON.stringify({ theme_color: name })
          }).then(function (r) { return r.json(); }).then(function () {
            if (statusEl) { statusEl.textContent = "Theme saved!"; statusEl.className = "theme-status success"; }
            setTimeout(function () { if (statusEl) statusEl.textContent = ""; }, 2000);
          }).catch(function () {
            if (statusEl) { statusEl.textContent = "Saved locally (server unavailable)"; statusEl.className = "theme-status"; }
          });
        }
        if (grid) grid.addEventListener("click", function (e) {
          var btn = e.target.closest("[data-theme]");
          if (!btn) return;
          var name = btn.getAttribute("data-theme");
          applyTheme(name);
          saveThemeToServer(name);
        });
        var saved = localStorage.getItem("theme_color");
        if (saved) { applyTheme(saved); }
        else {
          applyTheme("default");
          fetch((window.RegaliaStaff ? window.RegaliaStaff.API : "/api") + "/employee/theme", {
            headers: getHeaders()
          }).then(function (r) { return r.ok ? r.json() : null; }).then(function (data) {
            if (data && data.theme_color) { applyTheme(data.theme_color); localStorage.setItem("theme_color", data.theme_color); }
          }).catch(function () {});
        }
      })();

      // Profile modal logic
      (function () {
        var pOverlay = document.querySelector("[data-profile-overlay]");
        var pClose = document.querySelector("[data-profile-close]");
        var pOpen = document.querySelector("[data-open-profile]");
        if (!pOverlay) return;
        function openProfile() {
          pOverlay.classList.add("is-open");
          var dd = document.querySelector("[data-profile-dropdown]");
          if (dd) dd.classList.remove("is-open");
        }
        function closeProfile() { pOverlay.classList.remove("is-open"); }
        if (pOpen) pOpen.addEventListener("click", function (e) { e.preventDefault(); openProfile(); });
        if (pClose) pClose.addEventListener("click", closeProfile);
        pOverlay.addEventListener("click", function (e) { if (e.target === pOverlay) closeProfile(); });
        document.addEventListener("keydown", function (e) { if (e.key === "Escape" && pOverlay.classList.contains("is-open")) closeProfile(); });
        try {
          var emp = JSON.parse(localStorage.getItem("employee") || "{}");
          var ni = pOverlay.querySelector("[data-pf-name]"); if (ni) ni.value = emp.full_name || "";
          var ui = pOverlay.querySelector("[data-pf-username]"); if (ui) ui.value = emp.username || "";
          var ei = pOverlay.querySelector("[data-pf-email]"); if (ei) ei.value = emp.email || "";
          var ci = pOverlay.querySelector("[data-pf-contact]"); if (ci) ci.value = emp.contact_number || "";
        } catch (e) {}
        function getHeaders(json) {
          var h = {};
          try { var t = localStorage.getItem("token"); if (t) h.Authorization = "Bearer " + t; } catch (e) {}
          if (json) h["Content-Type"] = "application/json";
          return h;
        }
        var pForm = pOverlay.querySelector("[data-profile-form]");
        var pMsg = pOverlay.querySelector("[data-pf-msg]");
        if (pForm) pForm.addEventListener("submit", function (e) {
          e.preventDefault();
          if (pMsg) { pMsg.textContent = ""; pMsg.className = "settings-msg"; }
          var payload = {
            full_name: (pOverlay.querySelector("[data-pf-name]") || {}).value || "",
            username: (pOverlay.querySelector("[data-pf-username]") || {}).value || "",
            email: (pOverlay.querySelector("[data-pf-email]") || {}).value || "",
            contact_number: (pOverlay.querySelector("[data-pf-contact]") || {}).value || ""
          };
          fetch((window.RegaliaStaff ? window.RegaliaStaff.API : "/api") + "/employee/profile", {
            method: "PUT", headers: getHeaders(true), body: JSON.stringify(payload)
          }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (res) {
            if (!res.ok) { if (pMsg) pMsg.textContent = res.data.error || "Failed"; return; }
            localStorage.setItem("employee", JSON.stringify(res.data.employee));
            var initials = (payload.full_name || "FD").split(" ").filter(Boolean).map(function (w) { return w[0]; }).join("").slice(0, 2).toUpperCase();
            var pb = document.querySelector("[data-profile-btn]"); if (pb) pb.textContent = initials;
            var plg = document.querySelector("[data-profile-initials-lg]"); if (plg) plg.textContent = initials;
            var pn = document.querySelector("[data-profile-name]"); if (pn) pn.textContent = payload.full_name || "Staff";
            if (pMsg) { pMsg.textContent = "Profile saved!"; pMsg.className = "settings-msg success"; }
          }).catch(function () {
            try {
              var emp = JSON.parse(localStorage.getItem("employee") || "{}");
              emp.full_name = payload.full_name; emp.username = payload.username;
              emp.email = payload.email; emp.contact_number = payload.contact_number;
              localStorage.setItem("employee", JSON.stringify(emp));
              var initials = (payload.full_name || "FD").split(" ").filter(Boolean).map(function (w) { return w[0]; }).join("").slice(0, 2).toUpperCase();
              var pb = document.querySelector("[data-profile-btn]"); if (pb) pb.textContent = initials;
              var plg = document.querySelector("[data-profile-initials-lg]"); if (plg) plg.textContent = initials;
              var pn = document.querySelector("[data-profile-name]"); if (pn) pn.textContent = payload.full_name || "Staff";
              if (pMsg) { pMsg.textContent = "Saved locally"; pMsg.className = "settings-msg success"; }
            } catch (err) { if (pMsg) pMsg.textContent = "Could not save"; }
          });
        });
        var pwForm = pOverlay.querySelector("[data-pw-form]");
        var pwMsg = pOverlay.querySelector("[data-pw-msg]");
        if (pwForm) pwForm.addEventListener("submit", function (e) {
          e.preventDefault();
          if (pwMsg) { pwMsg.textContent = ""; pwMsg.className = "settings-msg"; }
          var fd = new FormData(pwForm);
          var cur = fd.get("current_password"), np = fd.get("new_password"), cp = fd.get("confirm_password");
          if (np !== cp) { if (pwMsg) pwMsg.textContent = "Passwords do not match."; return; }
          if (np.length < 6) { if (pwMsg) pwMsg.textContent = "Must be at least 6 characters."; return; }
          fetch((window.RegaliaStaff ? window.RegaliaStaff.API : "/api") + "/employee/password", {
            method: "PUT", headers: getHeaders(true), body: JSON.stringify({ current_password: cur, new_password: np })
          }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (res) {
            if (!res.ok) { if (pwMsg) pwMsg.textContent = res.data.error || "Failed"; return; }
            if (pwMsg) { pwMsg.textContent = "Password updated!"; pwMsg.className = "settings-msg success"; }
            pwForm.reset();
          }).catch(function () { if (pwMsg) pwMsg.textContent = "Server unavailable"; });
        });
      })();

      const toggle = document.querySelector(".topbar .menu-toggle");
      const closeButton = document.querySelector("[data-sidebar-close]");
      const sidebarOverlay = document.querySelector("[data-sidebar-overlay]");
      const navLinks = document.querySelectorAll(".sidebar .nav a");

      const closeSidebar = () => document.body.classList.remove("sidebar-open");
      const toggleSidebar = () =>
        document.body.classList.toggle("sidebar-open");

      if (toggle) toggle.addEventListener("click", toggleSidebar);
      if (closeButton) closeButton.addEventListener("click", closeSidebar);
      if (sidebarOverlay) sidebarOverlay.addEventListener("click", closeSidebar);
      navLinks.forEach((link) => link.addEventListener("click", closeSidebar));
    </script>
  </body>
</html>
