<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings | Regalia Owner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../admin/admin.css" />
  </head>
  <body data-page="owner-bookings">
    <div class="dashboard">
      <aside class="sidebar">
        <div class="brand"><img class="brand-logo" src="../logo.png" alt="Regalia" /></div>
        <nav class="nav">
          <a href="./index.html"
            ><span class="icon"
              ><svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                <rect x="3" y="14" width="7" height="7" rx="1"></rect></svg></span
            >Dashboard</a
          >
          <a href="./properties.html"
            ><span class="icon"
              ><svg viewBox="0 0 24 24">
                <path d="M3 21h18"></path>
                <path d="M5 21V7l7-4 7 4v14"></path>
                <path d="M9 21v-6h6v6"></path></svg></span
            >Properties</a
          >
          <a class="active" href="./bookings.html"
            ><span class="icon"
              ><svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="16" y1="2" x2="16" y2="6"></line></svg></span
            >Bookings</a
          >
          <a href="./monthly-dues.html"
            ><span class="icon"
              ><svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                <line x1="3" y1="10" x2="21" y2="10"></line></svg></span
            >Monthly Dues</a
          >
        </nav>
        <div class="sidebar-footer">
          <a href="../index.html"
            ><span class="icon"
              ><svg viewBox="0 0 24 24">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line></svg></span
            >Log out</a
          >
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1>Bookings</h1>
            <p>Review booking requests for your unit(s). Approve, cancel, or delete them.</p>
          </div>
          <div class="top-actions">
            <div class="profile-wrap">
              <button class="avatar avatar-btn" data-profile-btn aria-label="Account">OW</button>
              <div class="topbar-dropdown profile-dropdown" data-profile-dropdown>
                <div class="profile-info">
                  <div class="profile-avatar-lg" data-profile-initials-lg>OW</div>
                  <div>
                    <div class="profile-name" data-profile-name>Owner</div>
                    <div class="profile-role" data-profile-role>OWNER</div>
                  </div>
                </div>
                <a href="../index.html" class="profile-action" data-logout-link>Logout</a>
              </div>
            </div>
          </div>
        </header>

        <div class="bookings-content">
          <div class="bookings-section" data-section="next7">
            <h3 class="bookings-section-title">Next 7 Days</h3>
            <div class="bookings-list" data-list="next7"></div>
          </div>
          <div class="bookings-section" data-section="month">
            <h3 class="bookings-section-title">This Month</h3>
            <div class="bookings-list" data-list="month"></div>
          </div>
          <div class="bookings-section" data-section="later">
            <h3 class="bookings-section-title">Later</h3>
            <div class="bookings-list" data-list="later"></div>
          </div>
          <div class="empty-state" data-bookings-empty style="display: none;">No bookings yet. Guest submissions will appear here.</div>
        </div>
      </main>

      <!-- Booking detail sidebar (employee-style) -->
      <div class="assign-sidebar" id="bookingDetailSidebar" data-booking-detail-sidebar aria-hidden="true">
        <div class="assign-sidebar__backdrop" data-close-booking-detail></div>
        <div class="assign-sidebar__content" id="bookingDetailSidebarContent">
          <div class="assign-sidebar__header">
            <h3 class="assign-sidebar__title" data-booking-detail-title>Booking details</h3>
            <button class="icon-button" type="button" data-close-booking-detail aria-label="Close">
              <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="6" y1="18" x2="18" y2="6"></line></svg>
            </button>
          </div>
          <div class="assign-sidebar__body assign-sidebar__body--scroll">
            <div class="booking-detail-body" data-booking-detail-body></div>
          </div>
          <div class="assign-sidebar__footer booking-detail-actions" data-booking-detail-actions>
            <button class="submit-button full" type="button" data-confirm-booking style="display: none;">Confirm booking</button>
            <button class="submit-button danger" type="button" data-reject-booking style="display: none;">Reject booking</button>
            <button class="submit-button danger" type="button" data-cancel-booking style="display: none;">Cancel booking</button>
            <button class="submit-button full" type="button" data-checkout-booking style="display: none;">Check out guest</button>
            <button class="submit-button ghost" type="button" data-delete-booking style="display: none;">Delete booking</button>
          </div>
        </div>
      </div>

      <!-- Reject/Cancel modal (reason required) -->
      <div class="modal-overlay" data-reject-reason-modal>
        <div class="modal-card">
          <div class="modal-header">
            <h2 data-reject-modal-title>Reason</h2>
            <button class="icon-button" type="button" data-close-reject-modal aria-label="Close">
              <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="6" y1="18" x2="18" y2="6"></line></svg>
            </button>
          </div>
          <div class="modal-form">
            <label>Please provide a reason (required)
              <textarea data-reject-reason rows="4" placeholder="e.g. Dates no longer available"></textarea>
            </label>
            <div class="step-actions">
              <button class="submit-button ghost" type="button" data-cancel-reject>Cancel</button>
              <button class="submit-button danger" type="button" data-submit-reject data-submit-reject-label>Reject booking</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function gate() {
        try {
          if (!localStorage.getItem("token")) {
            window.location.replace("../index.html");
            return;
          }
          var role = String(localStorage.getItem("role") || "").toUpperCase();
          if (role !== "OWNER") {
            if (role === "ADMIN") window.location.replace("../admin/bookings.html");
            else window.location.replace("../index.html");
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function ownerProfileUi() {
        try {
          var emp = JSON.parse(localStorage.getItem("employee") || "{}");
          var name = emp.full_name || emp.username || "Owner";
          var ini = name
            .split(" ")
            .filter(Boolean)
            .map(function (w) {
              return w[0];
            })
            .join("")
            .slice(0, 2)
            .toUpperCase() || "OW";
          var pb = document.querySelector("[data-profile-btn]");
          if (pb) pb.textContent = ini;
          var plg = document.querySelector("[data-profile-initials-lg]");
          if (plg) plg.textContent = ini;
          var pn = document.querySelector("[data-profile-name]");
          if (pn) pn.textContent = name;
        } catch (e) {}

        var btn = document.querySelector("[data-profile-btn]");
        var dd = document.querySelector("[data-profile-dropdown]");
        if (btn && dd) {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            dd.classList.toggle("is-open");
          });
          document.addEventListener("click", function () {
            dd.classList.remove("is-open");
          });
        }
        var out = document.querySelector("[data-logout-link]");
        if (out) out.addEventListener("click", function () { try { localStorage.clear(); } catch (e) {} });
      })();
    </script>

    <script>
      (function ownerBookings() {
        var API = "/api";
        var listNext7 = document.querySelector('[data-list="next7"]');
        var listMonth = document.querySelector('[data-list="month"]');
        var listLater = document.querySelector('[data-list="later"]');
        var emptyEl = document.querySelector("[data-bookings-empty]");

        var detailSidebar = document.querySelector("[data-booking-detail-sidebar]");
        var detailContent = document.getElementById("bookingDetailSidebarContent");
        var detailTitle = document.querySelector("[data-booking-detail-title]");
        var detailBody = document.querySelector("[data-booking-detail-body]");
        var detailActions = document.querySelector("[data-booking-detail-actions]");
        var closeDetailBtns = document.querySelectorAll("[data-close-booking-detail]");
        var confirmBtn = document.querySelector("[data-confirm-booking]");
        var rejectBtn = document.querySelector("[data-reject-booking]");
        var cancelBtn = document.querySelector("[data-cancel-booking]");
        var checkoutBtn = document.querySelector("[data-checkout-booking]");
        var deleteBtn = document.querySelector("[data-delete-booking]");

        var rejectModal = document.querySelector("[data-reject-reason-modal]");
        var rejectModalTitle = document.querySelector("[data-reject-modal-title]");
        var rejectReasonInput = document.querySelector("[data-reject-reason]");
        var closeRejectBtn = document.querySelector("[data-close-reject-modal]");
        var cancelRejectBtn = document.querySelector("[data-cancel-reject]");
        var submitRejectBtn = document.querySelector("[data-submit-reject]");

        var allowedUnitIds = new Set();
        var bookings = [];
        var activeBookingId = null;
        var activeBookingUnitId = null;
        var rejectActionMode = "reject";

        function getAuthHeaders(withJson) {
          var h = {};
          if (withJson) h["Content-Type"] = "application/json";
          try {
            var t = localStorage && localStorage.getItem("token");
            if (t) h.Authorization = "Bearer " + t;
          } catch (e) {}
          return h;
        }

        function escapeHtml(s) {
          if (s == null || s === undefined) return "";
          var div = document.createElement("div");
          div.textContent = String(s);
          return div.innerHTML;
        }

        function getInitials(name) {
          if (!name || !String(name).trim()) return "-";
          var parts = String(name).trim().split(/\s+/);
          if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
          return (parts[0][0] || "?").toUpperCase();
        }

        function formatDate(d) {
          if (!d) return "-";
          try {
            var date = new Date(d);
            return isNaN(date.getTime()) ? String(d) : date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
          } catch (e) {
            return String(d);
          }
        }

        function getSection(checkIn) {
          if (!checkIn) return "later";
          var d = new Date(checkIn);
          if (isNaN(d.getTime())) return "later";
          var today = new Date();
          today.setHours(0, 0, 0, 0);
          var in7 = new Date(today);
          in7.setDate(in7.getDate() + 7);
          var endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
          if (d >= today && d <= in7) return "next7";
          if (d <= endOfMonth) return "month";
          return "later";
        }

        function statusClass(s) {
          if (s === "confirmed") return "booking-status--confirmed";
          if (s === "rejected" || s === "cancelled") return "booking-status--rejected";
          return "booking-status--pending";
        }

        function statusLabel(s) {
          if (s === "confirmed") return "Confirmed";
          if (s === "rejected" || s === "cancelled") return "Cancelled";
          return "Pending";
        }

        function clearLists() {
          if (listNext7) listNext7.innerHTML = "";
          if (listMonth) listMonth.innerHTML = "";
          if (listLater) listLater.innerHTML = "";
        }

        function renderList(container, list) {
          if (!container) return;
          container.innerHTML = "";
          list.forEach(function (b) {
            var card = document.createElement("button");
            card.type = "button";
            card.className = "booking-card";
            card.dataset.bookingId = String(b.booking_id);
            var dates = b.check_in_date && b.check_out_date
              ? "Check-in: " + formatDate(b.check_in_date) + " - Check-out: " + formatDate(b.check_out_date)
              : (b.inclusive_dates || "-");
            var unitInfo = [b.unit_number, b.unit_type].filter(Boolean).join(" - ") || "Unit";
            card.innerHTML =
              "<div class=\"booking-card__left\">" +
                "<div class=\"booking-card__avatar\">" + getInitials(b.guest_name) + "</div>" +
                "<div class=\"booking-card__info\">" +
                  "<p class=\"booking-card__name\">" + escapeHtml(b.guest_name) + " - " + escapeHtml(unitInfo) + "</p>" +
                  "<p class=\"booking-card__dates\">" + escapeHtml(dates) + "</p>" +
                "</div>" +
              "</div>" +
              "<div class=\"booking-card__status " + statusClass(b.status) + "\">" +
                "<span class=\"booking-status-dot\"></span>" +
                "<span>" + statusLabel(b.status) + "</span>" +
              "</div>";
            container.appendChild(card);
          });
        }

        function renderBookings() {
          clearLists();
          var next7 = [];
          var month = [];
          var later = [];
          bookings.forEach(function (b) {
            var sec = getSection(b.check_in_date);
            if (sec === "next7") next7.push(b);
            else if (sec === "month") month.push(b);
            else later.push(b);
          });
          renderList(listNext7, next7);
          renderList(listMonth, month);
          renderList(listLater, later);
          if (emptyEl) emptyEl.style.display = bookings.length ? "none" : "block";
        }

        function closeDetailModal() {
          if (detailContent) detailContent.classList.remove("is-visible");
          setTimeout(function () {
            if (detailSidebar) {
              detailSidebar.classList.remove("is-open");
              detailSidebar.setAttribute("aria-hidden", "true");
            }
            activeBookingId = null;
            activeBookingUnitId = null;
          }, 250);
        }

        function openRejectModal(isCancel) {
          rejectActionMode = isCancel ? "cancel" : "reject";
          if (rejectReasonInput) rejectReasonInput.value = "";
          if (rejectModalTitle) rejectModalTitle.textContent = isCancel ? "Reason for cancellation" : "Reason for rejection";
          if (submitRejectBtn) submitRejectBtn.textContent = isCancel ? "Cancel booking" : "Reject booking";
          if (rejectModal) rejectModal.classList.add("is-open");
        }

        function closeRejectModal() {
          if (rejectModal) rejectModal.classList.remove("is-open");
        }

        function assertAllowedActiveBooking() {
          if (!activeBookingId || activeBookingUnitId == null) return false;
          if (!allowedUnitIds.has(Number(activeBookingUnitId))) {
            alert("You don't have access to this booking.");
            closeDetailModal();
            return false;
          }
          return true;
        }

        function openDetailModal(bookingId) {
          activeBookingId = bookingId != null ? Number(bookingId) : null;
          if (!activeBookingId) return;

          fetch(API + "/bookings/" + activeBookingId, { headers: getAuthHeaders() })
            .then(function (r) {
              if (!r.ok) throw new Error("Not found");
              return r.json();
            })
            .then(function (b) {
              var uid = b && b.unit_id != null && b.unit_id !== "" ? Number(b.unit_id) : null;
              activeBookingUnitId = uid;
              if (uid == null || !allowedUnitIds.has(uid)) {
                alert("You don't have access to this booking.");
                activeBookingId = null;
                activeBookingUnitId = null;
                return;
              }

              if (!detailTitle || !detailBody) return;
              detailTitle.textContent =
                "Booking - " + (b.guest_name || "Guest") + " - " + (b.unit_number || "") + (b.tower_name ? " " + b.tower_name : "");
              var unitInfo = [b.unit_number, b.unit_type, b.tower_name].filter(Boolean).join(" - ") || "-";

              var paymentHtml = "";
              if (b.payment_method === "upload" && b.payment_proof) {
                paymentHtml =
                  "<p><strong>Payment method:</strong> Online</p>" +
                  "<img src=\"" + escapeHtml(b.payment_proof) + "\" alt=\"Payment proof\" class=\"booking-payment-proof-img\" />";
              } else {
                var pm = b.payment_method === "cash" || !b.payment_method ? "Cash" : b.payment_method;
                paymentHtml = "<p><strong>Payment method:</strong> " + escapeHtml(pm) + "</p>";
              }

              var html =
                "<div class=\"booking-detail-grid\">" +
                  "<div class=\"booking-detail-block\"><h4>Personal information</h4>" +
                    "<p><strong>Name:</strong> " + escapeHtml(b.guest_name) + "</p>" +
                    "<p><strong>Address:</strong> " + escapeHtml(b.permanent_address) + "</p>" +
                    "<p><strong>Age:</strong> " + escapeHtml(b.age) + " &nbsp; <strong>Nationality:</strong> " + escapeHtml(b.nationality) + "</p>" +
                    "<p><strong>Relation to owner:</strong> " + escapeHtml(b.relation_to_owner) + "</p>" +
                    "<p><strong>Occupation:</strong> " + escapeHtml(b.occupation) + "</p>" +
                    "<p><strong>Email:</strong> " + escapeHtml(b.email) + "</p>" +
                    "<p><strong>Contact:</strong> " + escapeHtml(b.contact_number) + "</p>" +
                  "</div>" +
                  "<div class=\"booking-detail-block\"><h4>Unit &amp; stay</h4>" +
                    "<p><strong>Unit:</strong> " + escapeHtml(unitInfo) + "</p>" +
                    "<p><strong>Inclusive dates:</strong> " + escapeHtml(b.inclusive_dates) + "</p>" +
                    "<p><strong>Check-in:</strong> " + formatDate(b.check_in_date) + " &nbsp; <strong>Check-out:</strong> " + formatDate(b.check_out_date) + "</p>" +
                    "<p><strong>Purpose of stay:</strong> " + escapeHtml(b.purpose_of_stay) + "</p>" +
                    "<p><strong>Paid:</strong> " + escapeHtml(b.paid_yes_no) + (b.amount_paid ? " - " + escapeHtml(b.amount_paid) : "") + "</p>" +
                    "<p><strong>Booking platform:</strong> " + escapeHtml(b.booking_platform) + "</p>" +
                    paymentHtml +
                  "</div>" +
                  "<div class=\"booking-detail-block booking-detail-block--status\"><h4>Status</h4>" +
                    "<p><strong>" + statusLabel(b.status) + "</strong></p>" +
                    (b.rejection_reason ? "<p class=\"booking-rejection-reason\"><strong>Reason:</strong> " + escapeHtml(b.rejection_reason) + "</p>" : "") +
                  "</div>" +
                "</div>";

              detailBody.innerHTML = html;

              if (detailActions) {
                detailActions.style.display = "flex";
                if (confirmBtn) confirmBtn.style.display = b.status === "pending" ? "inline-flex" : "none";
                if (rejectBtn) rejectBtn.style.display = b.status === "pending" ? "inline-flex" : "none";
                if (cancelBtn) cancelBtn.style.display = b.status === "confirmed" ? "inline-flex" : "none";
                var canCheckout = b.status === "confirmed" && b.checked_in_at && !b.checked_out_at;
                if (checkoutBtn) checkoutBtn.style.display = canCheckout ? "inline-flex" : "none";
                if (deleteBtn) deleteBtn.style.display = "inline-flex";
              }

              if (detailSidebar) {
                detailSidebar.classList.add("is-open");
                detailSidebar.setAttribute("aria-hidden", "false");
                if (detailContent) requestAnimationFrame(function () { detailContent.classList.add("is-visible"); });
              }
            })
            .catch(function () {
              alert("Could not load booking details.");
            });
        }

        function confirmBooking() {
          if (!assertAllowedActiveBooking()) return;
          fetch(API + "/bookings/" + activeBookingId + "/confirm", { method: "PUT", headers: getAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : r.json().then(function (e) { throw new Error(e.error || "Failed"); }); })
            .then(function () {
              closeDetailModal();
              loadBookings();
            })
            .catch(function (err) { alert(err.message || "Failed to confirm."); });
        }

        function checkoutBooking() {
          if (!assertAllowedActiveBooking()) return;
          fetch(API + "/bookings/" + activeBookingId + "/check-out", { method: "POST", headers: getAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : r.json().then(function (e) { throw new Error(e.error || "Failed"); }); })
            .then(function () {
              closeDetailModal();
              loadBookings();
            })
            .catch(function (err) { alert(err.message || "Failed to check out."); });
        }

        function deleteBooking() {
          if (!assertAllowedActiveBooking()) return;
          if (!confirm("Permanently delete this booking? This cannot be undone.")) return;
          fetch(API + "/bookings/" + activeBookingId, { method: "DELETE", headers: getAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : r.json().then(function (e) { throw new Error(e.error || "Failed"); }); })
            .then(function () {
              closeDetailModal();
              loadBookings();
            })
            .catch(function (err) { alert(err.message || "Failed to delete."); });
        }

        function submitReject() {
          if (!assertAllowedActiveBooking()) return;
          var reason = rejectReasonInput && rejectReasonInput.value.trim();
          if (!reason) {
            alert("Please provide a reason.");
            if (rejectReasonInput) rejectReasonInput.focus();
            return;
          }
          var isCancelAction = rejectActionMode === "cancel";
          if (submitRejectBtn) {
            submitRejectBtn.disabled = true;
            submitRejectBtn.textContent = isCancelAction ? "Cancelling..." : "Rejecting...";
          }
          fetch(API + "/bookings/" + activeBookingId + "/reject", {
            method: "PUT",
            headers: getAuthHeaders(true),
            body: JSON.stringify({ reason: reason })
          })
            .then(function (r) { return r.ok ? r.json() : r.json().then(function (e) { throw new Error(e.error || "Failed"); }); })
            .then(function () {
              closeRejectModal();
              closeDetailModal();
              loadBookings();
            })
            .catch(function (err) { alert(err.message || (isCancelAction ? "Failed to cancel." : "Failed to reject.")); })
            .finally(function () {
              if (submitRejectBtn) {
                submitRejectBtn.disabled = false;
                submitRejectBtn.textContent = isCancelAction ? "Cancel booking" : "Reject booking";
              }
            });
        }

        function loadAllowedUnits() {
          return fetch(API + "/properties", { headers: getAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (rows) {
              allowedUnitIds = new Set();
              (rows || []).forEach(function (u) {
                var uid = u && u.unit_id != null && u.unit_id !== "" ? Number(u.unit_id) : null;
                if (uid != null) allowedUnitIds.add(uid);
              });
            })
            .catch(function () { allowedUnitIds = new Set(); });
        }

        function loadBookings() {
          return fetch(API + "/bookings", { headers: getAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (data) {
              var all = Array.isArray(data) ? data : [];
              bookings = all.filter(function (b) {
                var uid = b && b.unit_id != null && b.unit_id !== "" ? Number(b.unit_id) : null;
                return uid != null && allowedUnitIds.has(uid);
              });
              renderBookings();
            })
            .catch(function () {
              bookings = [];
              renderBookings();
            });
        }

        // List click handlers (event delegation)
        [listNext7, listMonth, listLater].forEach(function (listEl) {
          if (!listEl) return;
          listEl.addEventListener("click", function (e) {
            var card = e.target.closest(".booking-card");
            if (!card || !card.dataset.bookingId) return;
            openDetailModal(card.dataset.bookingId);
          });
        });

        closeDetailBtns.forEach(function (btn) { btn.addEventListener("click", closeDetailModal); });
        if (detailSidebar && detailSidebar.querySelector(".assign-sidebar__backdrop")) {
          detailSidebar.querySelector(".assign-sidebar__backdrop").addEventListener("click", closeDetailModal);
        }
        if (confirmBtn) confirmBtn.addEventListener("click", confirmBooking);
        if (rejectBtn) rejectBtn.addEventListener("click", function () { openRejectModal(false); });
        if (cancelBtn) cancelBtn.addEventListener("click", function () { openRejectModal(true); });
        if (checkoutBtn) checkoutBtn.addEventListener("click", checkoutBooking);
        if (deleteBtn) deleteBtn.addEventListener("click", deleteBooking);
        if (closeRejectBtn) closeRejectBtn.addEventListener("click", closeRejectModal);
        if (cancelRejectBtn) cancelRejectBtn.addEventListener("click", closeRejectModal);
        if (rejectModal) rejectModal.addEventListener("click", function (e) { if (e.target === rejectModal) closeRejectModal(); });
        if (submitRejectBtn) submitRejectBtn.addEventListener("click", submitReject);

        // Boot
        clearLists();
        if (emptyEl) emptyEl.style.display = "none";
        Promise.resolve()
          .then(loadAllowedUnits)
          .then(loadBookings);
      })();
    </script>
  </body>
</html>
